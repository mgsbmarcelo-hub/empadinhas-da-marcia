<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Loja de Empadas - Novo Pedido</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; padding: 20px; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: #d35400; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; }
        
        #lista-pedidos { margin-top: 20px; }
        .pedido-item { background: #fff3e0; padding: 10px; border-radius: 5px; margin-bottom: 10px; display: flex; align-items: center; border-left: 5px solid #d35400; }
        .pedido-item.confirmado { border-left-color: #27ae60; background: #e8f5e9; }
        .pedido-item input[type="checkbox"] { width: auto; margin-right: 10px; }
        
        button { width: 100%; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; transition: 0.3s; }
        #btn-confirmar { background-color: #d35400; color: white; margin-top: 10px; }
        #btn-confirmar.alterar { background-color: #f39c12; }
        
        #btn-whatsapp { background-color: #25d366; color: white; text-decoration: none; text-align: center; display: none; margin-top: 20px; padding: 15px; }
        #btn-whatsapp.show { display: block; }
    </style>
</head>
<body>

<div class="container">
    <h2>Empadas da Vovó</h2>
    
    <div id="area-form">
        <div class="form-group">
            <label>Tipo de Empada:</label>
            <select id="sabor">
                <option value="Frango">Frango</option>
                <option value="Palmito">Palmito</option>
                <option value="Carne Seca">Carne Seca</option>
            </select>
        </div>
        <div class="form-group">
            <label>Quantidade:</label>
            <input type="number" id="qtd" value="1" min="1">
        </div>
        <div class="form-group">
            <label>Data de Encomenda:</label>
            <input type="date" id="data">
        </div>
        <button id="btn-confirmar" onclick="confirmarPedido()">Confirmar Pedido</button>
    </div>

    <div id="lista-pedidos"></div>
    <a href="#" id="btn-whatsapp" target="_blank">Enviar para WhatsApp</a>
</div>

<script>
    let pedidoConfirmado = false;

    function confirmarPedido() {
        const sabor = document.getElementById('sabor').value;
        const qtd = document.getElementById('qtd').value;
        const data = document.getElementById('data').value;
        const btn = document.getElementById('btn-confirmar');
        const lista = document.getElementById('lista-pedidos');
        const btnZap = document.getElementById('btn-whatsapp');

        if (!data) { alert("Por favor, selecione uma data."); return; }

        if (!pedidoConfirmado) {
            // MODO CONFIRMAR
            lista.innerHTML = `
                <div class="pedido-item confirmado">
                    <input type="checkbox" checked disabled>
                    <span>${qtd}x Empada de ${sabor} - Entrega: ${data}</span>
                </div>
            `;
            btn.innerText = "Alterar Dados";
            btn.classList.add('alterar');
            
            // Prepara Botão Whatsapp
            const mensagem = encodeURIComponent(`Olá! Quero encomendar: ${qtd} empada(s) de ${sabor} para o dia ${data}`);
            btnZap.href = `https://wa.me{mensagem}`;
            btnZap.classList.add('show');
            
            pedidoConfirmado = true;
        } else {
            // MODO ALTERAR
            btn.innerText = "Confirmar Pedido";
            btn.classList.remove('alterar');
            btnZap.classList.remove('show');
            lista.innerHTML = "";
            pedidoConfirmado = false;
        }
    }
</script>

</body>
</html>
