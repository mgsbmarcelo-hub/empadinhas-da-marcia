<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Empadaria Gourmet</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background-color: #fffaf0; color: #5d4037; text-align: center; padding: 20px; }
        .vitrine { display: flex; flex-wrap: wrap; justify-content: center; gap: 20px; margin-top: 30px; }
        .card { background: white; border: 2px solid #edc9af; border-radius: 20px; padding: 20px; width: 280px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .opcoes { text-align: left; margin: 15px 0; background: #fff5e6; padding: 10px; border-radius: 10px; }
        .botao { display: inline-block; background: #e67e22; color: white; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; transition: 0.3s; }
        .botao:hover { background: #d35400; scale: 1.05; }
        h1 { color: #d35400; font-size: 2.5em; }
    </style>
</head>
<body>

    <h1>🥧 Empadas da Marcia</h1>
    <p>Escolha seu sabor favorito e personalize!</p>

    <div class="vitrine">
        
        <!-- MODELO DE PRODUTO: FRANGO -->
        <div class="card">
            <h3>Empadinha de Frango</h3>
            <p>Frango desfiado temperado.</p>
            
            <div class="opcoes">
                <strong>Adicionar Catupiry?</strong><br>
                <input type="radio" name="frango" id="f_sem" checked> <label for="f_sem">Não (R$ 6,00)</label><br>
                <input type="radio" name="frango" id="f_com"> <label for="f_com">Sim (+ R$ 1,50)</label>
            </div>

            <a href="#" onclick="enviarPedido('Frango')" class="botao">Pedir Agora</a>
        </div>

        <!-- MODELO DE PRODUTO: CAMARÃO -->
        <div class="card">
            <h3>Empadinha de Camarão</h3>
            <p>Camarão fresco ao molho da casa.</p>
            
            <div class="opcoes">
                <strong>Adicionar Catupiry?</strong><br>
                <input type="radio" name="camarao" id="c_sem" checked> <label for="c_sem">Não (R$ 8,00)</label><br>
                <input type="radio" name="camarao" id="c_com"> <label for="c_com">Sim (+ R$ 1,50)</label>
            </div>

</a><a

    </div>

    <!-- Lógica para enviar ao WhatsApp -->
    <script>
        function enviarPedido(sabor) {
            let numero = "5521999512027"; // COLOQUE SEU NÚMERO AQUI (com DDD)
            let temCatupiry = "";
            
            // Verifica qual rádio está marcado (ID simplificado para o exemplo)
            if (sabor === 'Frango') {
                temCatupiry = document.getElementById('f_com').checked ? "COM Catupiry" : "SEM Catupiry";
            } else if (sabor === 'Camarão') {
                temCatupiry = document.getElementById('c_com').checked ? "COM Catupiry" : "SEM Catupiry";
            }

            let mensagem = `Olá! Gostaria de pedir uma Empadinha de ${sabor} (${temCatupiry}).`;
            let link = `https://wa.me{numero}?text=${encodeURIComponent(mensagem)}`;
            
            window.open(link, '_blank');
        }
    </script>

</body>
</html>
